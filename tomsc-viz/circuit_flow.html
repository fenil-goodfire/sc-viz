<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Tree Flow Animation</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #333;
    overflow: hidden;
  }

  #container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* Sidebar */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid #e5e7eb;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #sidebar h1 {
    font-size: 16px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }
  #sidebar h2 {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #444;
    margin-bottom: 4px;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .hint {
    font-size: 11px;
    color: #999;
    font-style: italic;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-row {
    display: flex;
    gap: 6px;
  }
  .btn {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:hover { background: #f3f4f6; border-color: #9ca3af; }
  .btn:active { background: #e5e7eb; }
  .btn.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .btn.primary:hover { background: #2563eb; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .sample-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sample-nav .btn { flex: 0; padding: 8px 14px; }
  .sample-label {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #666;
  }
  .speed-control input { flex: 1; }

  /* Layer progress */
  .layer-progress {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #888;
    padding: 3px 8px;
    border-radius: 4px;
    transition: all 0.3s;
  }
  .layer-row.active {
    background: #eff6ff;
    color: #1d4ed8;
    font-weight: 600;
  }
  .layer-row.done {
    background: #f0fdf4;
    color: #166534;
  }
  .layer-row .count {
    margin-left: auto;
    font-weight: 600;
  }

  /* Main SVG area */
  #viz {
    flex: 1;
    position: relative;
  }
  svg {
    width: 100%;
    height: 100%;
    background: #fafafa;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 250px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tooltip.visible { opacity: 1; }

  .layer-label {
    font-size: 13px;
    font-weight: 600;
    fill: #888;
    text-anchor: middle;
  }
  .layer-sublabel {
    font-size: 11px;
    fill: #aaa;
    text-anchor: middle;
  }
  .layer-line {
    stroke: #e5e7eb;
    stroke-width: 1;
    stroke-dasharray: 4 4;
  }
</style>
</head>
<body>

<div id="container">
  <div id="sidebar">
    <div>
      <h1>Feature Tree Flow</h1>
      <p class="hint">Watch how features activate layer by layer for a single input</p>
    </div>

    <div>
      <h2>Sample</h2>
      <div class="sample-nav">
        <button class="btn" id="btn-prev-sample">&larr;</button>
        <span class="sample-label" id="sample-label">1 / 20</span>
        <button class="btn" id="btn-next-sample">&rarr;</button>
      </div>
    </div>

    <div class="controls">
      <h2>Animation</h2>
      <div class="btn-row">
        <button class="btn primary" id="btn-play">Play</button>
        <button class="btn" id="btn-step">Step</button>
        <button class="btn" id="btn-reset">Reset</button>
      </div>
      <div class="speed-control">
        <span>Speed</span>
        <input type="range" id="speed-slider" min="200" max="2000" value="800" step="100">
        <span id="speed-label">0.8s</span>
      </div>
      <button class="btn" id="btn-save-gif" style="margin-top:4px;">Save GIF</button>
      <p class="hint" id="gif-status"></p>
    </div>

    <div>
      <h2>Layer Progress</h2>
      <div class="layer-progress" id="layer-progress"></div>
    </div>

    <div>
      <h2>Formula Types</h2>
      <div class="legend-item"><div class="legend-dot" style="background:#9ca3af"></div> Atomic</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> AND</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> OR</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> AND_NOT</div>
    </div>
  </div>

  <div id="viz">
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

function buildFlowVisualization(data, samples) {
  const colors = {
    atomic: '#9ca3af',
    AND: '#3b82f6',
    OR: '#22c55e',
    AND_NOT: '#ef4444',
  };
  const activeColors = {
    atomic: '#4b5563',
    AND: '#2563eb',
    OR: '#16a34a',
    AND_NOT: '#dc2626',
  };

  const container = document.getElementById('viz');
  const width = container.clientWidth;
  const height = container.clientHeight;

  // Build adjacency lookup
  const childrenOf = {};
  const parentsOf = {};
  const nodeMap = {};

  data.nodes.forEach(n => {
    nodeMap[n.id] = n;
    childrenOf[n.id] = [];
    parentsOf[n.id] = [];
  });
  data.edges.forEach(e => {
    childrenOf[e.source].push(e);
    parentsOf[e.target].push(e);
  });

  // Compute positions
  const margin = { top: 60, right: 40, bottom: 40, left: 40 };
  const layerX = {};
  const numLayers = data.layers.length;
  data.layers.forEach((l, i) => {
    layerX[l.index] = margin.left + (i / (numLayers - 1)) * (width - margin.left - margin.right);
  });

  data.nodes.forEach(n => {
    const layerCfg = data.layers[n.layer];
    const nFeats = layerCfg.num_features;
    const ySpan = height - margin.top - margin.bottom;
    const spacing = ySpan / (nFeats + 1);
    n.x = layerX[n.layer];
    n.y = margin.top + spacing * (n.index + 1);
  });

  // SVG setup
  const svg = d3.select('#viz')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.3, 5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Layer lines and labels
  const layerG = g.append('g').attr('class', 'layer-markers');
  data.layers.forEach(l => {
    const x = layerX[l.index];
    layerG.append('line')
      .attr('class', 'layer-line')
      .attr('x1', x).attr('x2', x)
      .attr('y1', margin.top - 10).attr('y2', height - margin.bottom);
    layerG.append('text')
      .attr('class', 'layer-label')
      .attr('x', x).attr('y', 20)
      .text(`L${l.index}: ${l.name}`);
    layerG.append('text')
      .attr('class', 'layer-sublabel')
      .attr('x', x).attr('y', 36)
      .text(`${l.num_features} features`);
  });

  // Edges
  const edgeG = g.append('g').attr('class', 'edges');
  const edgeElements = edgeG.selectAll('path')
    .data(data.edges)
    .join('path')
    .attr('d', d => {
      const s = nodeMap[d.source];
      const t = nodeMap[d.target];
      const dx = t.x - s.x;
      return `M${s.x},${s.y} C${s.x + dx * 0.4},${s.y} ${t.x - dx * 0.4},${t.y} ${t.x},${t.y}`;
    })
    .attr('fill', 'none')
    .attr('stroke', '#e2e8f0')
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.15)
    .attr('stroke-dasharray', d => d.negated ? '4 2' : 'none');

  // Nodes
  const nodeG = g.append('g').attr('class', 'nodes');
  const nodeElements = nodeG.selectAll('circle')
    .data(data.nodes)
    .join('circle')
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', d => Math.max(2.5, d.activation_rate * 25))
    .attr('fill', '#e5e7eb')
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.5)
    .attr('opacity', 0.3);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  nodeElements
    .on('mouseover', (event, d) => {
      const parents = parentsOf[d.id].map(e =>
        `${e.source}${e.negated ? ' (NOT)' : ''}`
      ).join(', ');
      tooltip.innerHTML = `<strong>${d.id}</strong><br>
        Type: ${d.type}<br>
        Activation: ${(d.activation_rate * 100).toFixed(1)}%
        ${d.layer > 0 ? '<br>Parents: ' + parents : ''}`;
      tooltip.classList.add('visible');
    })
    .on('mousemove', event => {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 15) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', () => tooltip.classList.remove('visible'));

  // Initial zoom to fit
  const allX = data.nodes.map(n => n.x);
  const allY = data.nodes.map(n => n.y);
  const bounds = {
    x: d3.min(allX) - 30, y: d3.min(allY) - 30,
    w: d3.max(allX) - d3.min(allX) + 60,
    h: d3.max(allY) - d3.min(allY) + 60,
  };
  const scale = Math.min(width / bounds.w, height / bounds.h) * 0.9;
  const tx = width / 2 - (bounds.x + bounds.w / 2) * scale;
  const ty = height / 2 - (bounds.y + bounds.h / 2) * scale;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

  // ============================================================
  // Animation state
  // ============================================================
  let currentSample = 0;
  let currentLayer = -1;  // -1 = reset, 0..3 = layer revealed
  let playing = false;
  let playTimer = null;
  let activeSet = new Set();

  const btnPlay = document.getElementById('btn-play');
  const btnStep = document.getElementById('btn-step');
  const btnReset = document.getElementById('btn-reset');
  const btnPrev = document.getElementById('btn-prev-sample');
  const btnNext = document.getElementById('btn-next-sample');
  const sampleLabel = document.getElementById('sample-label');
  const speedSlider = document.getElementById('speed-slider');
  const speedLabel = document.getElementById('speed-label');

  function getDelay() { return parseInt(speedSlider.value); }
  speedSlider.addEventListener('input', () => {
    speedLabel.textContent = (getDelay() / 1000).toFixed(1) + 's';
  });

  // Layer progress sidebar
  const progressContainer = document.getElementById('layer-progress');
  data.layers.forEach(l => {
    const row = document.createElement('div');
    row.className = 'layer-row';
    row.id = `layer-row-${l.index}`;
    row.innerHTML = `<span>L${l.index}: ${l.name}</span><span class="count" id="layer-count-${l.index}">-</span>`;
    progressContainer.appendChild(row);
  });

  function updateSampleLabel() {
    sampleLabel.textContent = `${currentSample + 1} / ${samples.length}`;
  }

  function loadSample(idx) {
    stopPlay();
    currentSample = idx;
    activeSet = new Set(samples[idx]);
    currentLayer = -1;
    updateSampleLabel();
    resetViz();
    updateLayerProgress();
  }

  btnPrev.addEventListener('click', () => {
    loadSample((currentSample - 1 + samples.length) % samples.length);
  });
  btnNext.addEventListener('click', () => {
    loadSample((currentSample + 1) % samples.length);
  });

  btnReset.addEventListener('click', () => {
    stopPlay();
    currentLayer = -1;
    resetViz();
    updateLayerProgress();
  });

  btnStep.addEventListener('click', () => {
    stopPlay();
    stepForward();
  });

  btnPlay.addEventListener('click', () => {
    if (playing) {
      stopPlay();
    } else {
      startPlay();
    }
  });

  function startPlay() {
    playing = true;
    btnPlay.textContent = 'Pause';
    // If fully revealed, reset first
    if (currentLayer >= numLayers - 1) {
      currentLayer = -1;
      resetViz();
      updateLayerProgress();
    }
    playNext();
  }

  function stopPlay() {
    playing = false;
    btnPlay.textContent = 'Play';
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  }

  function playNext() {
    if (!playing) return;
    if (currentLayer >= numLayers - 1) {
      stopPlay();
      return;
    }
    stepForward();
    playTimer = setTimeout(playNext, getDelay());
  }

  function stepForward() {
    if (currentLayer >= numLayers - 1) return;
    currentLayer++;
    revealLayer(currentLayer);
    updateLayerProgress();
  }

  function updateLayerProgress() {
    data.layers.forEach(l => {
      const row = document.getElementById(`layer-row-${l.index}`);
      const countEl = document.getElementById(`layer-count-${l.index}`);
      row.classList.remove('active', 'done');

      if (l.index < currentLayer) {
        row.classList.add('done');
        const count = samples[currentSample].filter(id => nodeMap[id].layer === l.index).length;
        countEl.textContent = `${count} active`;
      } else if (l.index === currentLayer) {
        row.classList.add('active');
        const count = samples[currentSample].filter(id => nodeMap[id].layer === l.index).length;
        countEl.textContent = `${count} active`;
      } else {
        countEl.textContent = '-';
      }
    });
  }

  function resetViz() {
    nodeElements.transition().duration(200)
      .attr('fill', '#e5e7eb')
      .attr('opacity', 0.3)
      .attr('r', d => Math.max(2.5, d.activation_rate * 25))
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.5);

    edgeElements.transition().duration(200)
      .attr('stroke', '#e2e8f0')
      .attr('stroke-width', 0.5)
      .attr('stroke-opacity', 0.15);
  }

  function revealLayer(layerIdx) {
    const delay = 80;

    // Light up nodes in this layer
    nodeElements.filter(d => d.layer === layerIdx)
      .transition().duration(400)
      .attr('fill', d => activeSet.has(d.id) ? activeColors[d.type] : '#e5e7eb')
      .attr('opacity', d => activeSet.has(d.id) ? 1 : 0.15)
      .attr('r', d => activeSet.has(d.id)
        ? Math.max(5, d.activation_rate * 35)
        : Math.max(1.5, d.activation_rate * 15))
      .attr('stroke', d => activeSet.has(d.id) ? '#fff' : '#fff')
      .attr('stroke-width', d => activeSet.has(d.id) ? 1.5 : 0.3);

    // Light up edges from previous layer to this layer
    if (layerIdx > 0) {
      edgeElements.filter(d => {
        const tgtLayer = nodeMap[d.target].layer;
        return tgtLayer === layerIdx;
      })
      .transition().delay(delay).duration(400)
      .attr('stroke', d => {
        const bothActive = activeSet.has(d.source) && activeSet.has(d.target);
        if (!bothActive) return '#e2e8f0';
        return d.negated ? '#ef4444' : activeColors[nodeMap[d.target].type];
      })
      .attr('stroke-width', d => {
        const bothActive = activeSet.has(d.source) && activeSet.has(d.target);
        return bothActive ? 2 : 0.3;
      })
      .attr('stroke-opacity', d => {
        const bothActive = activeSet.has(d.source) && activeSet.has(d.target);
        return bothActive ? 0.7 : 0.05;
      });
    }
  }

  // ============================================================
  // GIF recording
  // ============================================================
  const btnSaveGif = document.getElementById('btn-save-gif');
  const gifStatus = document.getElementById('gif-status');

  function captureSvgFrame(svgEl, scale) {
    return new Promise((resolve, reject) => {
      const w = svgEl.getAttribute('width') | 0;
      const h = svgEl.getAttribute('height') | 0;

      // Clone SVG and prepare for serialization
      const clone = svgEl.cloneNode(true);
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

      // Add background rect
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('width', '100%');
      bg.setAttribute('height', '100%');
      bg.setAttribute('fill', '#fafafa');
      clone.insertBefore(bg, clone.firstChild);

      // Embed CSS for text elements (not inlined by D3)
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
      styleEl.textContent = `
        .layer-label { font: 600 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #888; text-anchor: middle; }
        .layer-sublabel { font: 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #aaa; text-anchor: middle; }
        .layer-line { stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 4 4; }
      `;
      defs.appendChild(styleEl);
      clone.insertBefore(defs, clone.firstChild);

      const xml = new XMLSerializer().serializeToString(clone);
      const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas);
      };
      img.onerror = (e) => {
        URL.revokeObjectURL(url);
        reject(new Error('Failed to render SVG to canvas'));
      };
      img.src = url;
    });
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Fetch the gif.worker.js and create a same-origin Blob URL so
  // Web Workers don't get blocked by cross-origin restrictions.
  let _workerBlobUrl = null;
  async function getWorkerUrl() {
    if (_workerBlobUrl) return _workerBlobUrl;
    const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
    const text = await resp.text();
    const blob = new Blob([text], { type: 'application/javascript' });
    _workerBlobUrl = URL.createObjectURL(blob);
    return _workerBlobUrl;
  }

  async function saveAsGif() {
    const svgEl = container.querySelector('svg');
    if (!svgEl) return;

    const scale = 2;
    const w = (svgEl.getAttribute('width') | 0) * scale;
    const h = (svgEl.getAttribute('height') | 0) * scale;

    btnSaveGif.disabled = true;
    gifStatus.textContent = 'Preparing...';

    try {
      const workerUrl = await getWorkerUrl();

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: w,
        height: h,
        workerScript: workerUrl,
      });

      // Reset to initial state
      stopPlay();
      currentLayer = -1;
      resetViz();
      updateLayerProgress();
      await wait(400);

      gifStatus.textContent = 'Recording frames...';

      // Frame 0: all gray
      let canvas = await captureSvgFrame(svgEl, scale);
      gif.addFrame(canvas, { delay: 1000, copy: true });
      gifStatus.textContent = 'Captured initial frame...';

      // Frames 1-4: reveal each layer
      for (let l = 0; l < numLayers; l++) {
        currentLayer = l;
        revealLayer(l);
        updateLayerProgress();
        await wait(600);  // wait for D3 transitions
        canvas = await captureSvgFrame(svgEl, scale);
        const delay = (l === numLayers - 1) ? 1500 : 800;
        gif.addFrame(canvas, { delay, copy: true });
        gifStatus.textContent = `Captured layer ${l}...`;
      }

      gifStatus.textContent = 'Encoding GIF...';

      gif.on('finished', (blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `feature_tree_flow_sample${currentSample + 1}.gif`;
        a.click();
        URL.revokeObjectURL(url);
        btnSaveGif.disabled = false;
        gifStatus.textContent = 'GIF saved!';
        setTimeout(() => { gifStatus.textContent = ''; }, 3000);
      });

      gif.render();
    } catch (e) {
      console.error('GIF export failed:', e);
      btnSaveGif.disabled = false;
      gifStatus.textContent = 'Failed: ' + e.message;
    }
  }

  btnSaveGif.addEventListener('click', saveAsGif);

  // Initialize
  loadSample(0);
}
</script>
